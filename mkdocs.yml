site_name: clintools API
site_description: Clinical data utilities for Python programmers in pharma
site_author: Vignesh Thanikachalam
repo_url: https://github.com/vt704670/python_polars_book

theme:
  name: material
  palette:
    primary: teal
    accent: cyan

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - API Reference: api.md

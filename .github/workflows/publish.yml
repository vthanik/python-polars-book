name: Publish Book to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install polars pyreadstat pyarrow jupyter matplotlib plotnine lifelines

      - name: Install clintools (editable)
        run: pip install -e .

      - name: Fetch CDISC pilot data
        run: python scripts/00_fetch_pilot_data.py

      - name: Fetch Definitive Guide datasets
        run: python scripts/01_fetch_dg_data.py

      - name: Render Quarto book
        run: quarto render

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _book/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
